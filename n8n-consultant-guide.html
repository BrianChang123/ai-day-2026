<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n8n 워크플로우 전문 컨설턴트 지침서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f8f6f3;
    color: #2d2926;
    line-height: 1.8;
    padding: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8em;
    font-weight: 900;
    color: #0e8a7d;
    margin: 0 0 8px 0;
    line-height: 1.3;
  }

  h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3em;
    font-weight: 700;
    color: #2d2926;
    margin: 36px 0 12px 0;
    padding-bottom: 6px;
    border-bottom: 2px solid #0e8a7d;
  }

  h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05em;
    font-weight: 700;
    color: #0e8a7d;
    margin: 24px 0 8px 0;
  }

  h4 {
    font-size: 0.95em;
    font-weight: 700;
    color: #6b6560;
    margin: 18px 0 6px 0;
  }

  p { margin: 8px 0; }

  ul, ol {
    margin: 8px 0;
    padding-left: 24px;
  }

  li { margin: 4px 0; }

  code {
    font-family: 'JetBrains Mono', monospace;
    background: #e8e4de;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
    color: #0e8a7d;
  }

  pre {
    background: #2d2926;
    color: #f8f6f3;
    padding: 16px 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0;
    font-size: 0.85em;
    line-height: 1.6;
  }

  pre code {
    background: none;
    color: inherit;
    padding: 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 0.88em;
  }

  th {
    background: #0e8a7d;
    color: #fff;
    font-weight: 700;
    padding: 8px 12px;
    text-align: left;
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid #ddd6cc;
  }

  tr:nth-child(even) td {
    background: #f0ede8;
  }

  blockquote {
    border-left: 4px solid #0e8a7d;
    background: #e0f5f3;
    padding: 12px 16px;
    margin: 12px 0;
    border-radius: 0 6px 6px 0;
  }

  hr {
    border: none;
    border-top: 1px solid #ddd6cc;
    margin: 24px 0;
  }

  strong { color: #0e8a7d; }

  .header-bar {
    background: #0e8a7d;
    color: #fff;
    padding: 20px 24px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  .header-bar h1 { color: #fff; font-size: 1.4em; }
  .header-bar p { color: rgba(255,255,255,0.8); font-size: 0.8em; margin-top: 4px; }

  /* checkbox styling */
  input[type="checkbox"] { margin-right: 6px; }
  ul.task-list { list-style: none; padding-left: 8px; }
</style>
</head>
<body>

<div class="header-bar">
  <h1>n8n 워크플로우 전문 컨설턴트 지침서</h1>
  <p>Gemini Gems 지침용 · v2</p>
</div>

<div class="container" id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('n8n_consultant_guide_v2.md')
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
    })
    .catch(() => {
      // fallback: inline content
      document.getElementById('content').innerHTML = '<p>마크다운 파일을 불러올 수 없습니다.</p>';
    });
</script>

</body>
</html>
